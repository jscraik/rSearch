name: Bug Report
description: Report a bug in the rsearch CLI, parser, or download flow
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm install`
        2. Run `npm run dev -- search "query"` (or failing command)
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS: [e.g. macOS 15]
        - Node version: [e.g. 24.x]
        - npm version: [e.g. 11.x]
        - rsearch version/commit: [e.g. 0.1.6 / abc1234]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste terminal output, stack traces, or screenshots.
    validations:
      required: false
